<!doctype html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Sign in — Expense Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/dark.css') }}">
</head>
<body class="auth-body">
  <div class="auth-shell">
    <div class="neo-card auth-card">
      <h1 class="auth-title">Expense Tracker</h1>
      <p class="auth-sub" id="auth-sub">
        {% if first_run %}Welcome. Let's set up the two accounts.{% else %}Sign in to continue.{% endif %}
      </p>

      {% if first_run %}
      <form id="setup-form" class="auth-form" autocomplete="off">
        <fieldset>
          <legend>Admin (full access)</legend>
          <label>Username
            <input class="neo-input" type="text" name="admin_username" required minlength="2" autocomplete="off">
          </label>
          <label>Password
            <input class="neo-input" type="password" name="admin_password" required minlength="6" autocomplete="new-password">
          </label>
        </fieldset>
        <fieldset>
          <legend>Viewer (read-only)</legend>
          <label>Username
            <input class="neo-input" type="text" name="viewer_username" required minlength="2" autocomplete="off">
          </label>
          <label>Password
            <input class="neo-input" type="password" name="viewer_password" required minlength="6" autocomplete="new-password">
          </label>
        </fieldset>
        <button type="submit" class="neo-btn neo-btn-primary">Create accounts</button>
        <p class="form-error" id="setup-error" role="alert"></p>
      </form>
      {% else %}
      <form id="login-form" class="auth-form" autocomplete="off">
        <label>Username
          <input class="neo-input" type="text" name="username" required autocomplete="username">
        </label>
        <label>Password
          <input class="neo-input" type="password" name="password" required autocomplete="current-password">
        </label>
        <button type="submit" class="neo-btn neo-btn-primary">Sign in</button>
        <p class="form-error" id="login-error" role="alert"></p>
      </form>
      {% endif %}

      <button id="theme-toggle" class="neo-btn neo-btn-ghost theme-toggle" aria-label="Toggle dark mode">
        <span class="theme-icon">◐</span>
      </button>
    </div>
  </div>

  <script>
    (function () {
      const saved = localStorage.getItem("theme");
      if (saved === "dark") document.documentElement.dataset.theme = "dark";
      document.getElementById("theme-toggle").addEventListener("click", () => {
        const next = document.documentElement.dataset.theme === "dark" ? "light" : "dark";
        document.documentElement.dataset.theme = next;
        localStorage.setItem("theme", next);
      });

      const setupForm = document.getElementById("setup-form");
      if (setupForm) {
        setupForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          const err = document.getElementById("setup-error");
          err.textContent = "";
          const fd = new FormData(setupForm);
          const body = Object.fromEntries(fd.entries());
          const resp = await fetch("/api/auth/first-run", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body),
          });
          const data = await resp.json();
          if (!resp.ok) { err.textContent = data.error || "Setup failed"; return; }
          window.location.reload();
        });
      }

      const loginForm = document.getElementById("login-form");
      if (loginForm) {
        loginForm.addEventListener("submit", async (e) => {
          e.preventDefault();
          const err = document.getElementById("login-error");
          err.textContent = "";
          const fd = new FormData(loginForm);
          const body = Object.fromEntries(fd.entries());
          const resp = await fetch("/api/auth/login", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(body),
          });
          const data = await resp.json();
          if (!resp.ok) { err.textContent = data.error || "Login failed"; return; }
          window.location.href = "/";
        });
      }
    })();
  </script>
</body>
</html>
